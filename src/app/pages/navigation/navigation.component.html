<div class="flex h-screen ">
  
  <!-- Sidebar -->
  <div class="bg-[#141416] text-white h-screen w-20 p-3 flex flex-col items-center">
  <ul class="space-y-4 w-full">
    @for (item of navItems; track item?.name) {
      <li class="relative group flex justify-center">
        
        <!-- Icon -->
        <a
          [routerLink]="item?.path"
          routerLinkActive="bg-[#1f1f23]"
          class="flex items-center justify-center w-12 h-12 rounded-lg hover:bg-[#1f1f23] transition-all duration-200"
        >
          <i [class]="item?.iconName + ' text-2xl'"></i>
      </a>

        <!-- Tooltip -->
        <span
          class="absolute left-16 whitespace-nowrap bg-black text-white text-xs px-3 py-1 rounded-md opacity-0 group-hover:opacity-100 transition-all duration-200"
        >
          {{ item?.name }}
        </span>

      </li>
    }
  </ul>
</div>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col overflow-hidden">
    <router-outlet></router-outlet>
  </div>

</div>
